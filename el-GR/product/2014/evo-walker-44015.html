<!DOCTYPE html>
<html lang="el-GR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>44015 ΟΧΗΜΑ ΤΟΥ EVO | Hero Factory | LEGO.com (Ελλάδα)</title>
    <link rel="stylesheet" href="https://next.lego.com/_next/static/css/27f8ec8bf6bbfc37.css">
    <style>
        :root {
            --hf-orange: #ff8200;
            --hf-dark-grey: #1a1a1a;
        }
        body {
            font-family: sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        .product-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .product-image-gallery {
            background: radial-gradient(circle, #333 0%, #000 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .product-image-gallery img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255,130,0,0.3));
        }
        .product-details h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            color: var(--hf-orange);
            margin-bottom: 5px;
        }
        .product-details h2 {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 20px;
        }
        .price-tag {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 20px 0;
        }
        .buy-button {
            background-color: #ffd500;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
            font-size: 1.1rem;
        }
        .buy-button:hover {
            background-color: #fff;
        }
        .description-box {
            margin-top: 30px;
            line-height: 1.6;
            color: #ddd;
            border-top: 1px solid #444;
            padding-top: 20px;
        }
        .specs-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .specs-list li {
            font-size: 0.9rem;
            background: #222;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div id="product-page">
    </div>

<script type="application/json" id="product-data">
{
    "id": "44015",
    "name": "ΟΧΗΜΑ ΤΟΥ EVO",
    "theme": "Hero Factory",
    "subtheme": "Invasion from Below",
    "price": "9,99 €",
    "age": "6-12",
    "pieces": 51,
    "description": "Προσοχή, EVO! Ένα γιγάντιο τέρας έχει βγει από το ρήγμα και επιτίθεται στην Αντρόπολις Σίτυ. Πήδα μέσα στο πανίσχυρο όχημα, την τελευταία λέξη της τεχνολογίας, και αντιμετώπισε την απειλή. Χρησιμοποίησε το κανόνι λέιζερ και τα δαγκανωτά χέρια για να αιχμαλωτίσεις το κτήνος πριν είναι αργά!",
    "features": [
        "Περιλαμβάνει μίνι φιγούρα EVO με όπλο",
        "Διαθέτει ανακλινόμενη καμπίνα, κανόνι λέιζερ και κινητές αρθρώσεις",
        "Περιλαμβάνει ένα Τζαμπέρ που αναπηδά",
        "Συνδυάζεται με το 44018 ΜΗΧΑΝΗ ΤΖΕΤ ΤΟΥ FURNO"
    ],
    "imageUrl": "https://www.lego.com/cdn/product-assets/product.img.pri/44015_prod.jpg"
}
</script>

<script>
    const data = JSON.parse(document.getElementById('product-data').textContent);
    const container = document.getElementById('product-page');

    container.innerHTML = `
        <div class="product-container">
            <div class="product-image-gallery">
                <img src="${data.imageUrl}" alt="${data.name}">
            </div>
            <div class="product-details">
                <h2>LEGO® Hero Factory - ${data.id}</h2>
                <h1>${data.name}</h1>
                <div class="price-tag">${data.price}</div>
                <button class="buy-button" onclick="addToCart()">ΠΡΟΣΘΗΚΗ ΣΤΟ ΚΑΛΑΘΙ</button>
                
                <div class="description-box">
                    <p>${data.description}</p>
                    <ul class="specs-list">
                        <li><strong>Ηλικίες:</strong> ${data.age}</li>
                        <li><strong>Κομμάτια:</strong> ${data.pieces}</li>
                    </ul>
                    <h3>Χαρακτηριστικά:</h3>
                    <ul>
                        ${data.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                </div>
            </div>
        </div>
    `;

    function addToCart() {
        alert('Το προϊόν προστέθηκε στο καλάθι!');
    }
</script>

</body>
</html>
