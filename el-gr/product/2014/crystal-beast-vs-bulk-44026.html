<!DOCTYPE html>
<html lang="el-GR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Θηρίο Κρυστάλλων εναντίον BULK 44026 | Hero Factory | LEGO® Shop GR</title>
    <link rel="icon" type="image/x-icon" href="https://www.lego.com/favicon.ico">
    <style>
        :root {
            --lego-yellow: #FFD500;
            --lego-red: #D11A2A;
            --dark-blue: #002D62;
            --text-dark: #333333;
            --text-light: #666666;
            --bg-light: #F8F8F8;
            --border-color: #E0E0E0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Header */
        header {
            background-color: var(--lego-yellow);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            background-color: var(--lego-red);
            color: white;
            font-weight: 900;
            padding: 8px 12px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            margin-right: 20px;
        }

        .breadcrumbs {
            font-size: 14px;
            color: #000;
        }

        /* Main Layout */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Product Image */
        .product-gallery {
            background-color: var(--bg-light);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .product-gallery img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .product-gallery img:hover {
            transform: scale(1.03);
        }

        /* Product Details */
        .product-info h1 {
            font-size: 32px;
            margin-bottom: 5px;
            color: #000;
        }

        .theme-tag {
            display: inline-block;
            background-color: var(--dark-blue);
            color: white;
            padding: 4px 10px;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .set-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-light);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .set-meta span strong {
            color: var(--text-dark);
        }

        .price-section {
            margin-bottom: 25px;
        }

        .price {
            font-size: 28px;
            font-weight: bold;
            color: #000;
        }

        .status {
            color: var(--lego-red);
            font-weight: bold;
            font-size: 14px;
            margin-top: 5px;
        }

        .description {
            margin-bottom: 30px;
            color: #444;
            font-size: 16px;
        }

        /* Features Bullet Points */
        .features-list {
            margin-bottom: 30px;
            padding-left: 20px;
        }

        .features-list li {
            margin-bottom: 8px;
        }

        /* Legacy Warning Box */
        .legacy-notice {
            background-color: #FFF3CD;
            border-left: 4px solid #FFC107;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn-retired {
            display: inline-block;
            background-color: #E0E0E0;
            color: #757575;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: not-allowed;
            text-transform: uppercase;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">LEGO</div>
        <div class="breadcrumbs">Αρχική σελίδα > Hero Factory > Προϊόντα > 44026</div>
    </header>

    <main class="container">
        <section class="product-gallery">
            <img id="product-image" src="https://www.lego.com/cdn/product-assets/product.img.pri/44026_prod.jpg" alt="44026 Θηρίο Κρυστάλλων εναντίον BULK">
        </section>

        <section class="product-info">
            <span class="theme-tag" id="product-theme">...</span>
            <h1 id="product-title">...</h1>
            
            <div class="set-meta">
                <span>Κωδικός: <strong id="product-id">...</strong></span>
                <span>Ηλικίες: <strong id="product-ages">...</strong></span>
                <span>Κομμάτια: <strong id="product-pieces">...</strong></span>
                <span>Έτος: <strong id="product-year">...</strong></span>
            </div>

            <div class="price-section">
                <div class="price" id="product-price">...</div>
                <div class="status" id="product-status">...</div>
            </div>

            <div class="legacy-notice">
                <strong>Πληροφορίες Προϊόντος:</strong> Αυτό το σετ κυκλοφόρησε το 2014 και έχει πλέον αποσυρθεί. Δεν είναι πλέον διαθέσιμο για αγορά από το LEGO.com.
            </div>

            <div class="description" id="product-desc">...</div>
            
            <h3>Χαρακτηριστικά:</h3>
            <ul class="features-list" id="product-features"></ul>

            <button class="btn-retired" disabled>Αποσύρθηκε το προϊόν</button>
        </section>
    </main>

    <script id="data-json" type="application/json">
    {
        "set_id": "44026",
        "title": "Θηρίο Κρυστάλλων εναντίον BULK",
        "theme": "Hero Factory",
        "release_year": 2014,
        "ages": "7-14",
        "pieces": 83,
        "price_gr": "14.99€",
        "status_gr": "Αποσυρθέν Προϊόν",
        "description": "Προσοχή, BULK! Ένα επικίνδυνο νέο πλάσμα, το Θηρίο Κρυστάλλων, παραμονεύει στον υπόνομο της Αντρόπολις Σίτυ. Φόρεσε την εξελιγμένη πανοπλία σου, πάρε το πανίσχυρο όπλο λέιζερ και κατέβα στα έγκατα της γης για να το αντιμετωπίσεις. Το Θηρίο διαθέτει τεράστια κρυστάλλινα καρφιά και μια τρομερή δαγκάνα αρπαγής για να αιχμαλωτίζει τους Χίροουζ. Πρόσεξε τις επιθέσεις του και σώσε την πόλη πριν είναι αργά!",
        "features": [
            "Περιλαμβάνει τη μίνι φιγούρα BULK με ένα όπλο.",
            "Διαθέτει αρθρωτά άκρα, τεράστια ημιδιάφανα κρυστάλλινα καρφιά, λειτουργική δαγκάνα αρπαγής και ανοιγόμενο σαγόνι.",
            "Περιλαμβάνει ένα άλτη που εκτοξεύεται με ένα κλικ!",
            "Αιχμαλώτισε τον BULK στη μεγάλη δαγκάνα του Θηρίου.",
            "Συνδυάζεται με το 44024 Machine της SURGE για να δημιουργήσεις ένα ακόμα μεγαλύτερο τέρας!",
            "Ύψος πάνω από 23 εκατοστά."
        ]
    }
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Ανάκτηση των δεδομένων από το embedded data.json στοιχείο
            const jsonText = document.getElementById("data-json").textContent;
            const data = JSON.parse(jsonText);

            // Διασύνδεση με το DOM και εμφάνιση των δεδομένων
            document.getElementById("product-title").innerText = data.title;
            document.getElementById("product-theme").innerText = data.theme;
            document.getElementById("product-id").innerText = data.set_id;
            document.getElementById("product-ages").innerText = data.ages;
            document.getElementById("product-pieces").innerText = data.pieces;
            document.getElementById("product-year").innerText = data.release_year;
            document.getElementById("product-price").innerText = data.price_gr;
            document.getElementById("product-status").innerText = data.status_gr;
            document.getElementById("product-desc").innerText = data.description;

            const featuresContainer = document.getElementById("product-features");
            data.features.forEach(feature => {
                const li = document.createElement("li");
                li.innerText = feature;
                featuresContainer.appendChild(li);
            });
        });
    </script>
</body>
</html>
