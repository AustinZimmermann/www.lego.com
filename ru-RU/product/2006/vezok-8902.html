<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8902 Vezok (Везок) - BIONICLE® - LEGO.com</title>
    <style>
        body {
            font-family: Helvetica, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .product-container {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 40px;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .logo-bar {
            margin-bottom: 20px;
        }

        .bionicle-logo {
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .product-image {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(0, 80, 255, 0.4));
            margin: 20px 0;
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            color: #fff;
        }

        .product-id {
            color: #888;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .description {
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .buy-button {
            background-color: #0055ff;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .buy-button:hover {
            background-color: #0044cc;
            transform: scale(1.05);
        }

        .specs {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 40px;
            border-top: 1px solid #333;
            padding-top: 20px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="product-container">
    <div class="logo-bar">
        <div class="bionicle-logo">BIONICLE®</div>
    </div>

    <img src="https://img.bricklink.com/ItemImage/SN/0/8902-1.png" alt="Vezok" class="product-image">

    <div class="product-id">Артикул: 8902</div>
    <h1>Vezok (Везок)</h1>
    
    <p class="description">
        Везок — один из самых жестоких Пирак. Вооруженный гарпуном и способный поглощать силы врагов, он не остановится ни перед чем, чтобы заполучить Маску Жизни.
    </p>

    <a href="#" class="buy-button">Купить сейчас</a>

    <div class="specs">
        <div>Возраст: 7-16</div>
        <div>Деталей: 41</div>
        <div>Год: 2006</div>
    </div>
